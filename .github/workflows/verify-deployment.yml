name: Verify Deployment

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to verify (e.g. https://megumi-joy.github.io/megumi_massaje/)'
        required: true
        default: 'https://megumi-joy.github.io/megumi_massaje/'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        env:
          TARGET_URL: ${{ inputs.target_url }}
        run: npx playwright test tests/e2e/deployment.spec.js --reporter=list
